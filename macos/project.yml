name: TimeLoggerMac
options:
  bundleIdPrefix: com.raminsharifi
  deploymentTarget:
    macOS: "14.0"

schemes:
  TimeLoggerMac:
    build:
      targets:
        TimeLoggerMac: all
        TimeLoggerWidgets: all
    run:
      config: Debug

targets:
  TimeLoggerMac:
    type: application
    platform: macOS
    sources:
      - path: TimeLogger
        excludes:
          - Info.plist
          - LaunchAgents
      - path: ../ios/TimeLoggerWidgetsiOS/Shared.swift
      - path: ../ios/TimeLogger/Utilities/CalendarSuggestion.swift
    info:
      path: TimeLogger/Info.plist
      properties:
        CFBundleDisplayName: TimeLogger
        LSUIElement: false
        NSBluetoothAlwaysUsageDescription: "TimeLogger advertises a BLE peripheral so your iPhone and Apple Watch can sync timers instantly when nearby."
        NSLocalNetworkUsageDescription: "TimeLogger browses your Wi-Fi for other Macs running the tl daemon so the mesh of your Apple devices stays in sync."
        NSCalendarsFullAccessUsageDescription: "TimeLogger reads your calendar to suggest timers based on the event you're currently in or about to start."
        NSBonjourServices:
          - _tl._tcp
    settings:
      SWIFT_VERSION: "5.9"
      PRODUCT_BUNDLE_IDENTIFIER: com.raminsharifi.TimeLogger.mac
      PRODUCT_NAME: TimeLogger
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: ""
      CODE_SIGN_ENTITLEMENTS: TimeLogger/TimeLogger.entitlements
    entitlements:
      path: TimeLogger/TimeLogger.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.raminsharifi.TimeLogger
    dependencies:
      - target: TimeLoggerWidgets
    preBuildScripts:
      - name: Build tl daemon (cargo build --features serve,ble)
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          export PATH="$HOME/.cargo/bin:/opt/homebrew/bin:/usr/local/bin:$PATH"
          cd "$SRCROOT/.."
          if [[ "${CONFIGURATION}" == "Release" ]]; then
            cargo build --release --features "serve ble" --bin tl
          else
            cargo build --features "serve ble" --bin tl
          fi
    postBuildScripts:
      - name: Embed tl binary and LaunchAgent plist
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          if [[ "${CONFIGURATION}" == "Release" ]]; then
            TL_BIN="$SRCROOT/../target/release/tl"
          else
            TL_BIN="$SRCROOT/../target/debug/tl"
          fi
          APP_BUNDLE="$BUILT_PRODUCTS_DIR/$WRAPPER_NAME"
          mkdir -p "$APP_BUNDLE/Contents/MacOS"
          cp "$TL_BIN" "$APP_BUNDLE/Contents/MacOS/tl"
          chmod +x "$APP_BUNDLE/Contents/MacOS/tl"
          mkdir -p "$APP_BUNDLE/Contents/Library/LaunchAgents"
          cp "$SRCROOT/TimeLogger/LaunchAgents/com.raminsharifi.timelogger.daemon.plist" \
             "$APP_BUNDLE/Contents/Library/LaunchAgents/com.raminsharifi.timelogger.daemon.plist"
          if [[ -n "${EXPANDED_CODE_SIGN_IDENTITY:-}" && "${EXPANDED_CODE_SIGN_IDENTITY}" != "-" ]]; then
            codesign --force --sign "$EXPANDED_CODE_SIGN_IDENTITY" \
              --options runtime --timestamp=none \
              "$APP_BUNDLE/Contents/MacOS/tl"
          fi

  TimeLoggerWidgets:
    type: app-extension
    platform: macOS
    sources:
      - path: TimeLoggerWidgets
        excludes:
          - Info.plist
      - path: ../ios/TimeLoggerWidgetsiOS/Shared.swift
      - path: ../ios/TimeLoggerWidgetsiOS/TimerWidget.swift
    info:
      path: TimeLoggerWidgets/Info.plist
      properties:
        CFBundleDisplayName: TimeLoggerWidgets
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      SWIFT_VERSION: "5.9"
      PRODUCT_BUNDLE_IDENTIFIER: com.raminsharifi.TimeLogger.mac.widgets
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: ""
      CODE_SIGN_ENTITLEMENTS: TimeLoggerWidgets/TimeLoggerWidgets.entitlements
    entitlements:
      path: TimeLoggerWidgets/TimeLoggerWidgets.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.application-groups:
          - group.com.raminsharifi.TimeLogger
